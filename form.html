<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <form action="" method="get" enctype="application/x-www-form-urlencoded">
      <div>
        <label for="">Name:</label>
        <input type="text" name="userName" required placeholder="name" />
      </div>

      <div>
        <label for="">Email:</label>
        <input type="email" name="email" />
      </div>

      <div>
        <label for="">DOB:</label>
        <input type="date" name="dob" />
        <input type="time" name="time" />
      </div>

      <div>
        <textarea name="" id="" rows="10" cols="20"> </textarea>
      </div>

      <div>
        <input type="radio" name="gender" id="m" />Male
        <input type="radio" name="gender" id="f" value="female" />
        <label for="f">Female</label>
      </div>

      <div>
        <h4>Select Fruit</h4>
        <select name="fruit" id="" multiple>
          <option value="M">Mango</option>
          <option value="B">Banana</option>
          <option value="A">Apple</option>
          <option value="O">Orange</option>
        </select>
      </div>

      <div><button>Submit</button></div>
    </form>
  </body>
</html>
